<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Комментарии</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuex@3.6.2/dist/vuex.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
  <script src="https://unpkg.com/vuejs-datepicker@1.6.2/dist/vuejs-datepicker.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
 

</head>
<body>
    <div id="app">
        <header class="site-header">
            <p class="site-header__eyebrow">Отзывы</p>
            <h1 class="site-header__title">Комментарии <em>&amp; Отзывы</em></em></h1>
            <div class="site-header__line"></div>
        </header>
        <div class="toolbar">
            <span class="toolbar__label">Сортировать по:</span>
            <button class="sort-btn" :class="{ active: sortBy === 'id' }" @click="setSortBy('id')">ID<span v-if="sortBy === 'id'" class="arrow" :class="sortDir === 'desc' ? 'arrow-desc' : ''">↑</span></button>
            <button class="sort-btn" :class="{ active: sortBy === 'date' }" @click="setSortBy('date')">Дате<span v-if="sortBy === 'date'" class="arrow" :class="sortDir === 'desc' ? 'arrow-desc' : ''">↑</span></button>
        </div>
    </div>
</body>
</html>
